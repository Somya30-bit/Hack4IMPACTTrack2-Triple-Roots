<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiMitra - Crop Disease Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌾 KrishiMitra</h1>
        <h2>Crop Disease Detection</h2>

        <div class="card">
            <label for="imageUpload" class="upload-label">Upload Crop Image</label>
            <input type="file" id="imageUpload" accept="image/*">
            <button onclick="uploadImage()">Detect Disease</button>
        </div>

        <div class="card hidden" id="questionBox">
            <h3>Verification Questions</h3>

            <label>Are there white powdery spots on the leaves?</label>
            <select id="q1">
                <option value="">Select</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <label>Are there brown or yellow spots spreading on the leaves?</label>
            <select id="q2">
                <option value="">Select</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <label>Are the leaves drying or curling?</label>
            <select id="q3">
                <option value="">Select</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>

        <div class="card hidden" id="resultCard">
            <h3>Detection Result</h3>
            <div id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
