<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Market Advisory</title>
    <style>
        body {
            font-family: Arial;
            background: #f4fff4;
            text-align: center;
            padding: 40px;
        }

        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2e7d32;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }

        a {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Market Price Advisory</h1>

    <form method="POST">
        <input type="text" name="crop" placeholder="Enter crop (e.g. tomato)" required>
        <br>
        <button type="submit">Get Advice</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Results:</h3>
        <ul>
            {% for r in result %}
            <li>{{ r }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <a href="/">← Back to Home</a>
</div>

</body>
</html>
